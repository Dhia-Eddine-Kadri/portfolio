<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Minallo - AI Study Assistant for Students</title>
  <meta name="description" content="Minallo is an AI study assistant for students with AI notes, summaries, PDF tools, Pomodoro, flashcards, and course-based learning.">
  <link rel="canonical" href="https://minallo.de/">

  <!-- Open Graph (Facebook, LinkedIn, Slack, Discord previews) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Minallo">
  <meta property="og:title" content="Minallo - AI Study Assistant for Students">
  <meta property="og:description" content="Minallo is an AI study assistant for students with AI notes, summaries, PDF tools, Pomodoro, flashcards, and course-based learning.">
  <meta property="og:url" content="https://minallo.de/">
  <meta property="og:image" content="https://minallo.de/assets/hero.png">
  <meta property="og:locale" content="en_US">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Minallo - AI Study Assistant for Students">
  <meta name="twitter:description" content="Minallo is an AI study assistant for students with AI notes, summaries, PDF tools, Pomodoro, flashcards, and course-based learning.">
  <meta name="twitter:image" content="https://minallo.de/assets/hero.png">

  <!-- Structured data: tells Google this site is the Minallo AI study product,
       distinct from the unrelated "Minallo Camping Farm Resort" listings. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Minallo",
    "alternateName": "Minallo AI",
    "url": "https://minallo.de/",
    "description": "AI study assistant for students. AI notes, summaries, PDFs, flashcards, Pomodoro, course-based learning."
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Minallo",
    "url": "https://minallo.de/",
    "logo": "https://minallo.de/assets/favicon.png",
    "description": "Minallo is an AI study assistant for students with AI notes, summaries, PDF tools, Pomodoro, flashcards, and course-based learning."
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Minallo",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Web",
    "url": "https://minallo.de/",
    "description": "AI study assistant for students. AI notes, summaries, PDFs, flashcards, Pomodoro, and course-based learning."
  }
  </script>

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="/css/base.css?v=5" />
  <link rel="stylesheet" href="/css/theme.css?v=5" />
  <link rel="stylesheet" href="/css/styles.css?v=7" />
  <link rel="stylesheet" href="/css/layout.css?v=5" />
  <link rel="stylesheet" href="/css/document-rail.css?v=15" />
  </head>
  <body class="night">
    <!-- Splash screen shown while the app loads after sign-in -->
    <div id="ss-splash" style="display: none">
      <div class="ss-splash-inner">
        <div class="ss-splash-icon">M</div>
        <div class="ss-splash-name">Minallo</div>
        <div class="ss-splash-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- SECTIONS ARE INJECTED HERE BY loader.js.
         The static SEO hero below ships in the raw HTML so Googlebot
         (and crawlers that don't execute JS) can read the H1, the
         product description, and the "Minallo AI Study Assistant"
         phrasing without waiting for the SPA to hydrate. loader.js
         replaces this block with the rendered landing/app sections. -->
    <div id="ss-sections-root">
      <main class="ss-seo-hero" role="main" style="max-width:780px;margin:48px auto;padding:24px;color:#e2e8f0;font-family:Nunito,system-ui,sans-serif;text-align:center;">
        <h1 style="font-size:2.25rem;font-weight:800;line-height:1.15;margin:0 0 16px;color:#fff;">Minallo - AI Study Assistant for Students</h1>
        <p style="font-size:1.05rem;line-height:1.6;margin:0;color:#cbd5e1;">
          Minallo is an AI study assistant for students. It helps you summarize
          lecture notes, organize study materials, edit PDFs, create notes, use
          Pomodoro study sessions, and learn from your course documents with AI.
        </p>
      </main>
    </div>

    <script src="js/minallo.js?v=2"></script>
    <script src="js/config.js?v=1"></script>
    <script type="module" src="js/features/ai-chat/ai-typing-config.js?v=1"></script>

    <!-- Auth/session bootstrap: runs synchronously before supabase.js and loader.js -->
    <script src="js/auth-bootstrap.js?v=2"></script>

    <!-- Supabase REST client + auth logic (_enterApp, _showModal, _verifyAndEnter) -->
    <script src="js/supabase.js?v=4"></script>

    <!-- Section loader: fetches and injects HTML sections, fires ss-ready when done -->
    <script type="module" src="js/loader.js?v=4"></script>
  </body>
</html>
