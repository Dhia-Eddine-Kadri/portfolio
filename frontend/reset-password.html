<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — Minallo</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,700,800,900" />
    <link rel="stylesheet" href="/css/auth.css?v=4" />
    <script src="/js/config.js"></script>
    <style>
      /* Reset-password is a standalone page, not a modal — replicate the
         centering rules normally provided by #authModal so .na-shell sits in
         the middle of the viewport and never causes a horizontal scrollbar. */
      :root { --font-main: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      html, body { background: #031323; margin: 0; min-height: 100%; overflow-x: hidden; }
      body { font-family: var(--font-main); color: #f8fafc; -webkit-font-smoothing: antialiased; }
      .na-modal.rp-page {
        position: relative;
        inset: auto;
        display: flex;
        min-height: 100vh;
        width: 100%;
        align-items: safe center;
        justify-content: safe center;
        padding: 24px 20px;
        box-sizing: border-box;
        overflow-x: hidden;
        font-family: var(--font-main);
        color: #f8fafc;
      }
      .na-modal.rp-page .na-shell { max-width: 28rem; }
      .na-modal.rp-page .na-card { max-width: 28rem; margin: 0 auto; }
    </style>
  </head>
  <body>
    <div class="na-modal rp-page" role="dialog" aria-modal="false" aria-labelledby="rpTitle">
      <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
        <defs>
          <symbol id="na-i-graduation-cap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
            <path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
          </symbol>
          <symbol id="na-i-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </symbol>
          <symbol id="na-i-shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
            <path d="m9 12 2 2 4-4"/>
          </symbol>
          <symbol id="na-i-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </symbol>
          <symbol id="na-i-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
            <path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
          </symbol>
        </defs>
      </svg>

      <div class="na-bg-gradient" aria-hidden="true"></div>
      <div class="na-grid" aria-hidden="true"></div>
      <div class="na-orb na-orb-1" aria-hidden="true"></div>
      <div class="na-orb na-orb-2" aria-hidden="true"></div>
      <div class="na-orb na-orb-3" aria-hidden="true"></div>

      <section class="na-shell">
        <div class="na-card" style="grid-template-columns: 1fr">
          <div class="na-form-col">
            <div class="na-form-glow" aria-hidden="true"></div>
            <div class="na-form-inner">
              <div class="na-brand">
                <div class="na-brand-icon">
                  <svg width="25" height="25" aria-hidden="true"><use href="#na-i-graduation-cap"/></svg>
                  <span class="na-brand-dot" aria-hidden="true"></span>
                </div>
                <div>
                  <h1 class="na-brand-name">Minallo</h1>
                  <p class="na-brand-tagline">Study smarter</p>
                </div>
              </div>

              <div class="na-hero">
                <div class="na-badge">
                  <svg width="14" height="14" aria-hidden="true"><use href="#na-i-shield-check"/></svg>
                  <span class="na-badge-text">Account recovery</span>
                </div>
                <h2 id="rpTitle" class="na-heading">Set a new password.</h2>
                <p class="na-body">
                  Choose a strong password you don't use anywhere else. You'll be signed in
                  automatically and sent back to your dashboard.
                </p>
              </div>

              <div id="rpError" class="na-error" role="alert"></div>

              <form id="rpForm" class="na-form" onsubmit="event.preventDefault()">
                <label class="na-field">
                  <span class="na-field-label">New password</span>
                  <span class="na-input-wrap">
                    <svg class="na-input-icon" width="19" height="19" aria-hidden="true"><use href="#na-i-lock"/></svg>
                    <input id="rpPassword" type="password" autocomplete="new-password" placeholder="••••••••" class="na-input" minlength="8"/>
                  </span>
                  <div id="rpStrengthWrap" class="na-strength">
                    <div class="na-strength-bars">
                      <div id="rpws1" class="na-strength-bar"></div>
                      <div id="rpws2" class="na-strength-bar"></div>
                      <div id="rpws3" class="na-strength-bar"></div>
                      <div id="rpws4" class="na-strength-bar"></div>
                    </div>
                    <div id="rpStrengthLabel" class="na-strength-label"></div>
                  </div>
                </label>

                <label class="na-field">
                  <span class="na-field-label">Confirm password</span>
                  <span class="na-input-wrap">
                    <svg class="na-input-icon" width="19" height="19" aria-hidden="true"><use href="#na-i-lock"/></svg>
                    <input id="rpConfirm" type="password" autocomplete="new-password" placeholder="••••••••" class="na-input"/>
                  </span>
                  <div id="rpConfirmHint" class="na-confirm-hint"></div>
                </label>

                <button id="rpSubmit" type="submit" class="na-submit">
                  <span class="na-submit-text">Update password</span>
                  <svg class="na-submit-arrow" width="18" height="18" aria-hidden="true"><use href="#na-i-arrow-right"/></svg>
                </button>
              </form>

              <p class="na-switch-row">
                <span class="na-switch-prefix">Remembered it?</span>
                <a href="/" class="na-switch-link">Back to sign in</a>
              </p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      (function () {
        // Supabase redirects to /reset-password.html#access_token=...&type=recovery&...
        // Parse the hash on load and remember the recovery JWT.
        var hash = window.location.hash.replace(/^#/, '');
        var params = new URLSearchParams(hash);
        var token = params.get('access_token');
        var type = params.get('type');
        var refresh = params.get('refresh_token') || '';

        var rpError = document.getElementById('rpError');
        var rpForm = document.getElementById('rpForm');
        var rpPassword = document.getElementById('rpPassword');
        var rpConfirm = document.getElementById('rpConfirm');
        var rpSubmit = document.getElementById('rpSubmit');
        var rpConfirmHint = document.getElementById('rpConfirmHint');
        var rpStrengthLabel = document.getElementById('rpStrengthLabel');

        function showErr(msg, ok) {
          rpError.textContent = msg;
          rpError.style.display = 'block';
          rpError.style.color = ok ? '#22c55e' : '';
        }
        function hideErr() { rpError.style.display = 'none'; }

        if (!token || type !== 'recovery') {
          rpForm.style.display = 'none';
          showErr('This recovery link is missing or has expired. Please request a new one from the sign-in page.');
          return;
        }

        // Stash refresh token so a successful sign-in works after the redirect.
        if (refresh) {
          try { localStorage.setItem('sb_refresh', refresh); } catch (e) {}
        }

        function updateStrength() {
          var pw = rpPassword.value;
          var score = 0;
          if (pw.length >= 8) score++;
          if (pw.length >= 12) score++;
          if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
          if (/[0-9]/.test(pw)) score++;
          if (/[^A-Za-z0-9]/.test(pw)) score = Math.min(score + 1, 4);
          score = Math.min(score, 4);
          var colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
          var labels = ['Weak', 'Fair', 'Good', 'Strong'];
          ['rpws1','rpws2','rpws3','rpws4'].forEach(function (id, i) {
            var el = document.getElementById(id);
            if (el) el.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,.1)';
          });
          rpStrengthLabel.textContent = pw.length ? (labels[score - 1] || '') : '';
          rpStrengthLabel.style.color = score > 0 ? colors[score - 1] : 'rgba(255,255,255,.35)';
        }
        function updateConfirmHint() {
          if (!rpConfirm.value) { rpConfirmHint.textContent = ''; return; }
          if (rpConfirm.value === rpPassword.value) {
            rpConfirmHint.textContent = 'Passwords match';
            rpConfirmHint.style.color = '#22c55e';
          } else {
            rpConfirmHint.textContent = "Passwords don't match";
            rpConfirmHint.style.color = '#ef4444';
          }
        }
        rpPassword.addEventListener('input', updateStrength);
        rpConfirm.addEventListener('input', updateConfirmHint);

        async function submit() {
          hideErr();
          var pw = rpPassword.value;
          var cf = rpConfirm.value;
          if (!pw || pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }
          if (pw !== cf) { showErr("Passwords don't match."); return; }

          rpSubmit.disabled = true;
          var label = rpSubmit.querySelector('.na-submit-text');
          var prev = label ? label.textContent : '';
          if (label) label.textContent = 'Updating…';

          try {
            // Hit Supabase GoTrue directly using the recovery JWT as bearer.
            // config.js sets window.MinalloConfig with the public anon key.
            var cfg = window.MinalloConfig || {};
            var supaUrl = cfg.supabaseUrl;
            var anonKey = cfg.supabaseAnonKey;
            if (!supaUrl || !anonKey) {
              throw new Error('Could not reach the server. Try again in a moment.');
            }
            var res = await fetch(supaUrl + '/auth/v1/user', {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                apikey: anonKey,
                Authorization: 'Bearer ' + token
              },
              body: JSON.stringify({ password: pw })
            });
            var body = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              throw new Error(body.error_description || body.error || body.msg || 'Could not update password');
            }
            // Persist the now-active session so the user lands signed in.
            try {
              localStorage.setItem('sb_token', token);
            } catch (e) {}
            showErr('Password updated. Redirecting…', true);
            setTimeout(function () { window.location.href = '/'; }, 1200);
          } catch (e) {
            showErr(e.message || 'Could not update password.');
            rpSubmit.disabled = false;
            if (label) label.textContent = prev;
          }
        }
        rpSubmit.addEventListener('click', submit);
        rpForm.addEventListener('submit', submit);
      })();
    </script>
  </body>
</html>
