<div class="aip-outer" id="aipOuter">
  <!-- ── HISTORY SIDEBAR ── -->
  <div class="aip-sidebar" id="aipSidebar">
    <div class="aip-sidebar-top">
      <button class="aip-new-chat-btn" id="aipNewChatBtn">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span data-i18n="aip_new_chat">New chat</span>
      </button>
    </div>
    <div class="aip-sidebar-section-label" data-i18n="aip_chats_label">Chats</div>
    <div class="aip-history-list" id="aipHistoryList">
      <div class="aip-history-empty" data-i18n="aip_no_chats">No chats yet</div>
    </div>
  </div>

  <!-- ── MAIN AREA ── -->
  <div class="aip-wrap" id="aipWrap">
    <!-- LANDING VIEW -->
    <div class="aip-landing" id="aipLanding">
      <div class="aip-landing-hero">
        <div class="aip-greeting" id="aipGreeting">Hi there</div>
        <div class="aip-subtitle" data-i18n="aip_subtitle">Where should we start?</div>
      </div>
      <div class="aip-center-box">
        <textarea
          class="aip-center-input"
          id="aipLandingInput"
          placeholder="Ask me anything…"
          data-i18n-ph="aip_landing_ph"
          rows="2"
          maxlength="4000"
        ></textarea>
        <div class="aip-file-preview" id="aipLandingFilePreview"></div>
        <div class="aip-center-bottom">
          <input
            type="file"
            id="aipLandingFileInput"
            accept=".pdf,.txt,.docx,.png,.jpg,.jpeg"
            multiple
            style="display: none"
          />
          <label class="aip-upload-btn" for="aipLandingFileInput">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
              />
            </svg>
            <span data-i18n="aip_upload_btn">Upload photos &amp; files</span>
          </label>
          <button class="aip-upload-btn" id="aipImportCourseBtn">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
            </svg>
            Import from Course
          </button>
          <button class="aip-center-send" id="aipLandingSend">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
      <div class="aip-chips-row" id="aipSuggestions">
        <button
          class="aip-chip"
          data-prompt="Explain the difference between integrals and derivatives"
        >
          📐 Calculus basics
        </button>
        <button
          class="aip-chip"
          data-prompt="How do I manage my time better as a university student?"
        >
          ⏰ Time management
        </button>
        <button class="aip-chip" data-prompt="Give me 5 tips for writing a good academic paper">
          📝 Academic writing
        </button>
        <button class="aip-chip" data-prompt="What is the Pomodoro technique and how do I use it?">
          🍅 Pomodoro method
        </button>
        <button class="aip-chip" data-prompt="Explain Newton's three laws of motion">
          ⚙️ Newton's laws
        </button>
      </div>
    </div>

    <!-- CHAT VIEW -->
    <div class="aip-chat-view" id="aipChatView" style="display: none">
      <div class="aip-chat-topbar">
        <button class="aip-sb-toggle" id="aipSbToggle" title="Toggle history">&#x2630;</button>
        <span class="aip-chat-topbar-title" id="aipChatTitle">Chat</span>
        <button class="aip-clear-btn" id="aipClearBtn">
          &#x2715; <span data-i18n="aip_new_chat">New chat</span>
        </button>
      </div>
      <div class="aip-msgs" id="aipMsgs"></div>
      <div class="aip-input-bar">
        <div class="aip-input-inner">
          <div class="aip-file-preview" id="aipChatFilePreview"></div>
          <textarea
            class="aip-input"
            id="aipInput"
            placeholder="Ask a follow-up…"
            data-i18n-ph="aip_followup_ph"
            rows="1"
            maxlength="4000"
          ></textarea>
          <div class="aip-input-actions">
            <input
              type="file"
              id="aipChatFileInput"
              accept=".pdf,.txt,.docx,.png,.jpg,.jpeg"
              multiple
              style="display: none"
            />
            <label class="aip-upload-btn" for="aipChatFileInput">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                />
              </svg>
              <span data-i18n="aip_upload_btn">Upload photos &amp; files</span>
            </label>
            <button class="aip-upload-btn" id="aipImportCourseBtnChat">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
              </svg>
              Import from Course
            </button>
            <button class="aip-send-btn" id="aipSend">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- /aip-wrap -->

  <!-- Import-from-course modal -->
  <div class="aip-course-overlay" id="aipCourseOverlay" style="display: none">
    <div class="aip-course-modal">
      <div class="aip-course-modal-hdr">
        <span>Import from Course</span>
        <button class="aip-course-modal-close" id="aipCourseClose">&#x2715;</button>
      </div>
      <div class="aip-course-modal-body">
        <select class="aip-course-sel" id="aipCourseSel"></select>
        <input
          class="aip-course-search"
          id="aipCourseSearch"
          type="text"
          placeholder="Search folders or files…"
          autocomplete="off"
        />
        <div class="aip-course-breadcrumb" id="aipCourseBreadcrumb" style="display: none">
          <button class="aip-course-back-btn" id="aipCourseBack">&#x2190; Back</button>
          <span class="aip-course-breadcrumb-label" id="aipCourseBreadcrumbLabel"></span>
        </div>
        <div class="aip-course-file-list" id="aipCourseFileList">
          <div class="aip-course-loading" id="aipCourseLoading" style="display: none">
            <div class="aip-course-spinner"></div>
            Loading files…
          </div>
          <div class="aip-course-empty" id="aipCourseEmpty" style="display: none">
            No files found in this course.
          </div>
          <div id="aipCourseFiles"></div>
        </div>
      </div>
      <div class="aip-course-modal-ftr">
        <span class="aip-course-sel-count" id="aipCourseSelCount">0 files selected</span>
        <button class="aip-course-cancel" id="aipCourseCancel">Cancel</button>
        <button class="aip-course-import" id="aipCourseImport" disabled>Import</button>
      </div>
    </div>
  </div>
</div>
<!-- /aip-outer -->
