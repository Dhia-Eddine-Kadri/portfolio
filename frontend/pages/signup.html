<!-- ONBOARDING MODAL — visuals defined in css/onboarding.css -->
<div id="onboardModal" class="ob-modal">
  <button id="obLogoutBtn" class="ob-logout-btn" data-i18n="ob_log_out">Log out</button>
  <div class="ob-card">
    <!-- Progress -->
    <div class="ob-progress">
      <div id="obProg1" class="ob-progress-seg is-active"></div>
      <div id="obProg2" class="ob-progress-seg"></div>
      <div id="obProg3" class="ob-progress-seg"></div>
    </div>

    <!-- Header -->
    <div class="ob-header">
      <h2 id="obTitle" class="ob-title" data-i18n="ob_welcome_title">Welcome to Minallo</h2>
      <div id="obSub" class="ob-sub" data-i18n="ob_step1">Let's set up your profile — step 1 of 3</div>
      <!-- Hidden — kept so legacy JS that writes to it is a harmless no-op. -->
      <span id="obEmoji" style="display:none"></span>
    </div>

    <!-- ── Step 1: Basic info ── -->
    <div id="obStep1" class="ob-step is-active">
      <div class="ob-row">
        <div class="ob-field">
          <label class="ob-label" data-i18n="ob_first_name">First name</label>
          <input id="obFirst" type="text" data-i18n-ph="ob_first_name_ph" placeholder="" class="ob-input" />
        </div>
        <div class="ob-field">
          <label class="ob-label" data-i18n="ob_last_name">Last name</label>
          <input id="obLast" type="text" data-i18n-ph="ob_last_name_ph" placeholder="" class="ob-input" />
        </div>
      </div>
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_age">Age</label>
        <input id="obAge" type="number" min="16" max="99" data-i18n-ph="ob_age_ph" placeholder="" class="ob-input" />
      </div>
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_email">Email</label>
        <input id="obEmail" type="email" data-i18n-ph="ob_email_ph" placeholder="" class="ob-input" />
      </div>
      <div id="obErr1" class="ob-err"></div>
      <button id="obContinueBtn" class="ob-btn-primary ob-btn-block" type="button" data-i18n="ob_continue_btn">Continue</button>
    </div>

    <!-- ── Step 2: Path chooser ── -->
    <div id="obStep2" class="ob-step">
      <div class="ob-prompt" data-i18n="ob_prompt_describe">Which best describes you?</div>
      <div class="ob-path-grid">
        <button class="ob-path-card" id="obPathEnrolled" data-path="enrolled" type="button">
          <span class="ob-path-name" data-i18n="ob_path_uni">University student</span>
          <span class="ob-path-sub" data-i18n="ob_path_uni_sub">Already enrolled at a German university</span>
        </button>
        <button class="ob-path-card is-disabled" id="obPathLearner" data-path="learner" type="button" disabled aria-disabled="true">
          <span class="ob-path-name" data-i18n="ob_path_learner">German learner</span>
          <span class="ob-path-sub" data-i18n="ob_path_learner_soon">Coming soon</span>
        </button>
      </div>
      <div id="obErr2" class="ob-err"></div>
      <button id="obBack1Btn" class="ob-btn-ghost" type="button" data-i18n="ob_back_btn">← Back</button>
    </div>

    <!-- ── Step 3a: Enrolled details ── -->
    <div id="obStep3a" class="ob-step">
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_bundesland">Bundesland</label>
        <select id="obState" class="ob-input">
          <option value="" data-i18n="ob_bundesland_ph">Select your Bundesland…</option>
        </select>
      </div>
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_university">University</label>
        <div class="ob-field-with-drop">
          <input id="obUni" type="text" data-i18n-ph="ob_uni_ph_before" placeholder="Pick a Bundesland first" autocomplete="off" class="ob-input" disabled />
          <div id="obUniDrop" class="ob-drop"></div>
        </div>
      </div>
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_programme">Study programme</label>
        <div class="ob-field-with-drop">
          <input id="obProg" type="text" data-i18n-ph="ob_programme_ph" placeholder="" autocomplete="off" class="ob-input" />
          <div id="obProgDrop" class="ob-drop"></div>
        </div>
      </div>
      <div id="obVertiefungRow" class="ob-field">
        <label class="ob-label" data-i18n="ob_vertiefung">Vertiefung (Fachprofil)</label>
        <div class="ob-field-with-drop">
          <input id="obVertiefung" type="text" data-i18n-ph="ob_vertiefung_ph" placeholder="" autocomplete="off" class="ob-input" />
          <div id="obVertDrop" class="ob-drop"></div>
        </div>
      </div>
      <div class="ob-row">
        <div class="ob-field">
          <label class="ob-label" data-i18n="ob_semester">Semester</label>
          <input id="obSem" type="number" min="1" max="20" data-i18n-ph="ob_semester_ph" placeholder="" class="ob-input" />
        </div>
        <div class="ob-field">
          <label class="ob-label" data-i18n="ob_matrikel">Matrikelnummer</label>
          <input id="obMatrikel" type="text" data-i18n-ph="ob_matrikel_ph" placeholder="" class="ob-input" />
        </div>
      </div>
      <div id="obErr3a" class="ob-err"></div>
      <div class="ob-actions">
        <button id="obBack2aBtn" class="ob-btn-ghost" type="button" data-i18n="ob_back_btn">← Back</button>
        <button id="obFinish" class="ob-btn-primary" type="button" data-i18n="ob_finish_btn">Finish</button>
      </div>
    </div>

    <!-- ── Step 3b: German learner details ── -->
    <div id="obStep3b" class="ob-step">
      <div class="ob-field">
        <label class="ob-label" data-i18n="ob_which_test">Which test are you preparing for?</label>
        <div class="ob-test-grid" id="obTestGrid">
          <button class="ob-test-card" data-test="TestDaF" type="button">
            <span class="ob-test-name">TestDaF</span>
            <span class="ob-test-sub">Test Deutsch als Fremdsprache</span>
          </button>
          <button class="ob-test-card" data-test="DSH" type="button">
            <span class="ob-test-name">DSH</span>
            <span class="ob-test-sub">Deutsche Sprachprüfung für den Hochschulzugang</span>
          </button>
          <button class="ob-test-card" data-test="Goethe" type="button">
            <span class="ob-test-name">Goethe-Zertifikat</span>
            <span class="ob-test-sub" data-i18n="ob_test_goethe_sub">Goethe-Institut language certificate</span>
          </button>
          <button class="ob-test-card" data-test="telc" type="button">
            <span class="ob-test-name">telc Deutsch</span>
            <span class="ob-test-sub" data-i18n="ob_test_telc_sub">The European Language Certificates</span>
          </button>
          <button class="ob-test-card" data-test="OESD" type="button">
            <span class="ob-test-name">ÖSD</span>
            <span class="ob-test-sub">Österreichisches Sprachdiplom Deutsch</span>
          </button>
          <button class="ob-test-card" data-test="DSD" type="button">
            <span class="ob-test-name">DSD</span>
            <span class="ob-test-sub">Deutsches Sprachdiplom der KMK</span>
          </button>
        </div>
      </div>
      <div id="obLevelWrap" class="ob-field" style="display: none">
        <label class="ob-label" data-i18n="ob_level_question">What is your current / target level?</label>
        <div class="ob-level-grid" id="obLevelGrid"></div>
      </div>
      <div id="obErr3b" class="ob-err"></div>
      <div class="ob-actions">
        <button id="obBack2bBtn" class="ob-btn-ghost" type="button" data-i18n="ob_back_btn">← Back</button>
        <button id="obFinishLearner" class="ob-btn-primary" type="button" data-i18n="ob_finish_btn">Finish</button>
      </div>
    </div>
  </div>
</div>
