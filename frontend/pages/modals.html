<!-- MULTI-FILE SUMMARY MODAL -->
<div id="multiSumModal">
  <div class="msm-box">
    <div class="msm-hdr">
      <div class="msm-title" id="msmTitle">✨ Combined Summary</div>
      <button class="msm-close" id="msmClose">✕</button>
    </div>
    <div class="msm-body" id="msmBody"></div>
    <div class="msm-foot">
      <button class="msm-save-btn" id="msmSaveBtn">💾 Save to Lecture Notes</button>
    </div>
  </div>
</div>

<!-- LECTURE NOTE MODAL -->
<div class="ln-modal-bg" id="lnModal">
  <div class="ln-modal">
    <div class="ln-modal-hdr">
      <div class="ln-modal-title" id="lnModalTitle"></div>
      <button class="ln-modal-close" id="lnModalClose">✕</button>
    </div>
    <div class="ln-modal-body" id="lnModalBody"></div>
    <div class="ln-modal-foot">
      <span style="font-size: 0.68rem; color: rgba(255, 255, 255, 0.25)" id="lnModalDate"></span>
      <button class="ln-modal-del" id="lnModalDel">🗑 Delete note</button>
    </div>
  </div>
</div>
