# fly.toml app configuration file generated for python-ai on 2026-05-12T19:37:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'python-ai'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Phase-3 indexing uses FastAPI BackgroundTasks — /index-document
  # returns 200 in ms while the actual work runs async on the Python
  # process. With auto_stop_machines='suspend' + min_machines_running=0,
  # Fly considered the machine idle the moment the response went out and
  # suspended it mid-task. All three reindexes froze in `extracting_text`
  # because the background tasks were killed before they could update
  # the DB row. Keep one machine warm and only stop on real idle.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 2048
