# fly.toml app configuration file generated for python-ai on 2026-05-12T19:37:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'python-ai'
primary_region = 'fra'

[build]

[env]
  # Drives CORS origin allow-list + whether sourceDebug payloads are exposed to
  # clients (app/main.py, ask.py). Must be 'production' on the live app so we
  # don't ship debug internals or localhost CORS to real users.
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  # Phase-3 indexing uses FastAPI BackgroundTasks — /index-document
  # returns 200 in ms while the actual work runs async on the Python
  # process. With auto_stop_machines='suspend' + min_machines_running=0,
  # Fly considered the machine idle the moment the response went out and
  # suspended it mid-task. All three reindexes froze in `extracting_text`
  # because the background tasks were killed before they could update
  # the DB row. Keep one machine warm and only stop on real idle.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  # shared (not performance) CPUs: the AI workload is mostly I/O-bound (waiting
  # on OpenAI/Supabase), so dedicated cores aren't needed yet — 2 shared cpus
  # run the 2 gunicorn workers + threadpool fine. 2 GB is the OCR-OOM guard
  # (vision OCR rasterizes PDF pages to PNG). NB: performance cpus would force a
  # 4 GB minimum (2 GB/core); revisit if load tests show CPU throttling.
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
