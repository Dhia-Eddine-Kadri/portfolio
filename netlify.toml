[build]
  publish = "frontend"
  functions = "backend/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/node_modules/pdf-parse/**"]

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

