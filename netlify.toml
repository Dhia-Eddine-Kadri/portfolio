# API routes: restrict CORS to production origin only.
# Replace HTTPS://YOUR-PRODUCTION-DOMAIN.COM with the real URL before go-live.
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://minallo.de"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age = "86400"

# JS / CSS are cache-busted with ?v=N query strings in loader.ts and the
# entry HTML, so we can cache them aggressively. Bumping MinalloConfig.assetVersion
# (or the per-file ?v=N) on deploy is what invalidates them in browsers.
[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lazily-imported feature ESM modules are the exception to the immutable rule
# above. They're loaded via dynamic import() and statically import their own
# leaf modules — and a relative `import './leaf.js'` does NOT inherit the
# parent's ?v= query, so the ?v cache-busting scheme can't reach every hop.
# Pinning them `immutable` meant a deploy never reached browsers (e.g. the AI
# chat render fixes). Revalidate instead: a short TTL then an ETag check, so
# updates land within minutes. These load on demand, so it's cheap.
[[headers]]
  for = "/js/features/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files are NOT versioned in their URL (loader fetches /pages/portal.html
# directly, not /pages/portal.html?v=N). Keep them short-cached so deploys are
# visible quickly, but allow a small TTL + revalidation to skip the full
# round-trip when nothing has changed.
[[headers]]
  for = "/**/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://www.youtube.com https://www.paypal.com https://www.paypalobjects.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net https://fonts.bunny.net; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.bunny.net https://fonts.gstatic.com; connect-src 'self' https://minallo.de https://accounts.google.com https://www.googleapis.com https://wprfkjeiawxlcnitsfdr.supabase.co https://python-ai.fly.dev https://api-m.paypal.com https://api.paypal.com https://www.paypal.com https://www.paypalobjects.com https://accounts.spotify.com https://api.spotify.com wss://wprfkjeiawxlcnitsfdr.supabase.co https://unpkg.com; worker-src 'self' blob: https://cdnjs.cloudflare.com; frame-src 'self' blob: https://accounts.google.com https://www.youtube.com https://www.youtube-nocookie.com https://www.paypal.com; form-action 'self'; upgrade-insecure-requests"
