# Cloudflare Pages config. Most settings live in the Pages dashboard,
# but a wrangler.toml lets us pin compatibility flags and the pages_build_output_dir
# so the build is reproducible from a fresh clone / preview deploy.

name = "minallo"
compatibility_date = "2026-05-22"

# Workers runtime needs nodejs_compat for the few Functions that import
# from "crypto" (stripe-webhook.ts, documents-upload.ts, trial-device.ts)
# — they use createHash / createHmac / timingSafeEqual which are Node-only.
# With this flag, `import crypto from 'crypto'` resolves to Node's crypto
# polyfilled on V8, so the existing handler code runs unchanged.
compatibility_flags = ["nodejs_compat"]

# Pages serves files from this directory and auto-routes /functions/api/*
# as Pages Functions on top of them.
pages_build_output_dir = "frontend"
